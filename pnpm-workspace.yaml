# https://pnpm.io/settings

shellEmulator: true
dedupePeers: true
ignoreWorkspaceRootCheck: true

packages:
  - examples/**
  - playground
  - test/fixture
  - test/minimal

trustPolicy: no-downgrade
trustPolicyExclude:
  - "semver@6.3.1"

blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  "@parcel/watcher": false
  esbuild: false
  keytar: false
  sharp: false
  vue-demi: false
  workerd: false

peerDependencyRules:
  allowedVersions:
    vite: "8"
    typescript: "6"
