# https://pnpm.io/settings

shellEmulator: true
dedupePeers: true
ignoreWorkspaceRootCheck: true
linkWorkspacePackages: "deep"
minimumReleaseAge: 1440

overrides:
  "nitro": "workspace:*"
  "cookie-es": "^3.1.1"
  "oxc-parser": "link:./shims/oxc-parser"
  # "vite": "^7"

packages:
  - examples/**
  - playground
  - test/fixture
  - test/minimal

trustPolicy: no-downgrade
trustPolicyExclude:
  - "semver@6.3.1"

blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  # Allowed
  "better-sqlite3": true
  # Blocked
  "@parcel/watcher": false
  "@prisma/client": false
  esbuild: false
  keytar: false
  sharp: false
  vue-demi: false
  workerd: false

peerDependencyRules:
  allowedVersions:
    vite: "8"
    typescript: "6"

updateConfig:
  ignoreDependencies:
    - vite7

patchedDependencies:
  '@hiogawa/vite-plugin-fullstack': patches/@hiogawa__vite-plugin-fullstack.patch

minimumReleaseAgeExclude:
  - automd*
  - c12*
  - changelogen*
  - citty*
  - compatx*
  - confbox*
  - consola*
  - cookie-es*
  - crossws*
  - db0*
  - defu*
  - destr*
  - env-runner*
  - exsolve*
  - get-port-please*
  - giget*
  - h3*
  - hookable*
  - httpxy*
  - knitwork*
  - mdzilla*
  - mlly*
  - nf3*
  - nypm*
  - obuild*
  - ocache*
  - ofetch*
  - ohash*
  - pathe*
  - perfect-debounce*
  - pkg-types*
  - rou3*
  - scule*
  - serve-placeholder*
  - srvx*
  - std-env*
  - ufo*
  - uncrypto*
  - unctx*
  - unenv*
  - unimport*
  - unstorage*
  - untyped*
  - unwasm*
